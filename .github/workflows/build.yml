name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build azura-client (JDK 8)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - run: mvn -B -ntp clean install -pl azura-client -DskipTests

      # Build azura-runelite (JDK 11)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - run: mvn -B -ntp clean install -pl azura-runelite -am -DskipTests

      # Build azura-server (JDK 8)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - run: mvn -B -ntp clean install -pl azura-server -DskipTests

      # Publish release if tag
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            azura-client/target/*.jar
            azura-runelite/target/*.jar
            azura-server/target/*.jar